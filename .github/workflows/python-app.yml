name: Python CI

on:
  push:
    branches: [ "main", "develop", "feature/*", "logic_ui" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # зупинить білд, якщо є помилки синтаксису або невизначені змінні
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # попередження (exit-zero) для стилістичних речей
        flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics

    - name: Test with pytest and generate Coverage
      run: |
        # Запускаємо тести:
        # --cov=. : рахуємо покриття для всього проєкту
        # --cov-report=html : створюємо детальну папку htmlcov
        # --html=report.html : створюємо загальний звіт про проходження тестів
        pytest --cov=. --cov-report=html --html=report.html --self-contained-html

    - name: Upload Quality Reports
      if: always() # завантажувати навіть якщо тести впали, щоб побачити помилки
      uses: actions/upload-artifact@v4
      with:
        name: quality-reports
        path: |
          report.html
          htmlcov/